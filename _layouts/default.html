<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b2a55">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <title>{{ page.title | default: site.title }} · Game Rules</title>
    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#rules">Skip to the rules</a>

    <header class="hero" id="top">
      <div class="hero__inner">
        <div class="hero__mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <path d="M32 6C18.8 6 8 16.8 8 30c0 17.8 24 29 24 29s24-11.2 24-29C56 16.8 45.2 6 32 6Z" fill="none" stroke="currentColor" stroke-width="4"/>
            <path d="M18 30s5.2-9 14-9 14 9 14 9-5.2 9-14 9-14-9-14-9Z" fill="none" stroke="currentColor" stroke-width="3.5"/>
            <circle cx="32" cy="30" r="4.5" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <p class="eyebrow">Official game guide</p>
          <h1>{{ page.title | default: site.title }}</h1>
          <p class="hero__lede">Hide smart. Follow the clues. Find everyone before time runs out.</p>
        </div>
        <div class="hero__actions" aria-label="Page actions">
          <button class="action-button" type="button" data-share>Share rules</button>
          <button class="action-button action-button--quiet" type="button" onclick="window.print()">Print / save PDF</button>
        </div>
      </div>
    </header>

    <nav class="section-nav" aria-label="Rule sections">
      <div class="section-nav__inner">
        <a href="#objective">Start</a>
        <a href="#teams">Teams</a>
        <a href="#scoring">Scoring</a>
        <a href="#photo-clues">Clues</a>
        <a href="#finds">Finding</a>
        <a href="#safety">Safety</a>
        <a href="#map">Map</a>
      </div>
    </nav>

    <main class="page-shell" id="rules">
      <article class="rules-card">
        {{ content }}
      </article>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p>Play fair, stay safe, and respect the neighbourhood.</p>
        <p class="maintainer-link"><a href="{{ site.repository_url }}/edit/main/rules.md">Maintainers: edit the rules on GitHub</a></p>
      </div>
    </footer>
  </body>
</html>
